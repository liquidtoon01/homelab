---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install common dependencies
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - software-properties-common
      - python3-pip
      - git
      - wget
      - zip
      - unzip
      - conntrack
      - socat
    state: present
    update_cache: yes

- name: Install Docker prerequisites
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose
    state: present

- name: Start and enable Docker service
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: yes

- name: Get current username
  ansible.builtin.command: whoami
  register: current_user
  changed_when: false
  become: no

- name: Add current user to docker group
  ansible.builtin.user:
    name: "{{ current_user.stdout }}"
    groups: docker
    append: yes

- name: Reset SSH connection to activate docker group
  ansible.builtin.meta: reset_connection

- name: Install cifs-utils on Minikube node
  ansible.builtin.command: minikube ssh "sudo apt-get update && sudo apt-get install -y cifs-utils"
  failed_when: false
  changed_when: false
  become: no

- name: Mount SMB share on Minikube node
  ansible.builtin.command: >
    minikube ssh "sudo mkdir -p /mnt/media-shows && 
    sudo mount -t cifs //plex-jellyfin..tail44dd7.ts.net/Videos/Shows /mnt/media-shows 
  failed_when: false
  changed_when: false
  become: no
  no_log: true