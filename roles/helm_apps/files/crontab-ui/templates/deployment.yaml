apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "crontab-ui.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "crontab-ui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "crontab-ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "crontab-ui.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.hostNetwork }}
      hostNetwork: true
      {{- end }}
      {{- if .Values.hostPID }}
      hostPID: true
      {{- end }}
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: web
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        env:
        {{- range $key, $value := .Values.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        volumeMounts:
        {{- if .Values.hostAccess.enabled }}
        - name: host-cron
          mountPath: /host-cron
        {{- end }}
        {{- if .Values.persistence.enabled }}
        - name: data
          mountPath: /crontab-ui
        {{- end }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
      volumes:
      {{- if .Values.hostAccess.enabled }}
      - name: host-cron
        hostPath:
          path: {{ .Values.hostAccess.cronPath }}
          type: DirectoryOrCreate
      {{- end }}
      {{- if .Values.persistence.enabled }}
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "crontab-ui.fullname" . }}-data
      {{- end }}
