replicaCount: 1

image:
  repository: alseambusher/crontab-ui
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

# Tailscale configuration
tailscale:
  enabled: true
  hostname: "cron"

# Host access configuration
hostAccess:
  enabled: true
  cronPath: /etc/crontabs

# Environment variables
env:
  HOST: "0.0.0.0"
  PORT: "8000"
  CRON_PATH: "/host-cron"

# Persistence configuration
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 100Mi

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi

securityContext:
  privileged: true

# Host networking (required for host cron access)
hostNetwork: true
hostPID: true
