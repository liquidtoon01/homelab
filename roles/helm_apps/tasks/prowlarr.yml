---
- name: Create Prowlarr namespace
  ansible.builtin.command: kubectl create namespace {{ prowlarr_namespace }}
  failed_when: false
  changed_when: false
  become: no

- name: Create Prowlarr PVC manifest
  ansible.builtin.copy:
    dest: /tmp/prowlarr-pvc.yaml
    content: |
      ---
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: prowlarr-config
        namespace: {{ prowlarr_namespace }}
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: {{ storage_class }}
        resources:
          requests:
            storage: 1Gi
  become: no

- name: Apply Prowlarr PVC
  ansible.builtin.command: kubectl apply -f /tmp/prowlarr-pvc.yaml
  changed_when: true
  become: no

- name: Update Helm repositories
  ansible.builtin.command: helm repo update
  changed_when: false
  become: no

- name: Create Prowlarr Helm values file
  ansible.builtin.copy:
    dest: /tmp/prowlarr-values.yaml
    content: |
      env:
        TZ: UTC
        # After deployment, add Sonarr app in Prowlarr:
        # - Host: sonarr.{{ sonarr_namespace }}.svc.cluster.local
        # - Port: 8989
        # - API Key: Get from Sonarr Settings > General > Security
      
      service:
        main:
          type: ClusterIP
          annotations:
            tailscale.com/expose: "true"
            tailscale.com/hostname: "{{ tailscale_prowlarr_hostname | default('prowlarr') }}"
          ports:
            http:
              port: 9696
      
      persistence:
        config:
          enabled: true
          existingClaim: prowlarr-config
      
      resources:
        limits:
          cpu: 500m
          memory: 1Gi
        requests:
          cpu: 100m
          memory: 256Mi

- name: Deploy Prowlarr using Helm
  ansible.builtin.command: >
    helm upgrade --install prowlarr pree/prowlarr
    --namespace {{ prowlarr_namespace }}
    --values /tmp/prowlarr-values.yaml
    {{ '--version ' + prowlarr_chart_version if prowlarr_chart_version else '' }}
    --wait
  changed_when: true
  become: no
