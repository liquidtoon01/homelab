---
- name: Create crontab-ui namespace
  ansible.builtin.command: kubectl create namespace {{ crontab_ui_namespace }}
  failed_when: false
  changed_when: false
  become: no

- name: Create Crontab UI Helm values file
  ansible.builtin.copy:
    dest: /tmp/crontab-ui-values.yaml
    content: |
      tailscale:
        enabled: true
        hostname: {{ tailscale_crontab_ui_hostname }}

      persistence:
        enabled: true
        storageClass: {{ storage_class }}
        size: 100Mi

      env:
        HOST: "0.0.0.0"
        PORT: "8000"
        CRON_PATH: "/host-cron-real"

      hostAccess:
        enabled: true
        cronPath: /host-cron-real

      hostNetwork: true
      hostPID: true

      resources:
        limits:
          cpu: 200m
          memory: 256Mi
        requests:
          cpu: 50m
          memory: 128Mi
  become: no

- name: Deploy Crontab UI using local Helm chart
  ansible.builtin.command: >
    helm upgrade --install crontab-ui {{ role_path }}/files/crontab-ui
    --namespace {{ crontab_ui_namespace }}
    --values /tmp/crontab-ui-values.yaml
    --create-namespace
  changed_when: true
  become: no
