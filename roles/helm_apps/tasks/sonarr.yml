---
- name: Create Sonarr namespace
  ansible.builtin.command: kubectl create namespace {{ sonarr_namespace }}
  failed_when: false
  changed_when: false
  become: no

- name: Create Sonarr PVCs manifest
  ansible.builtin.copy:
    dest: /tmp/sonarr-pvcs.yaml
    content: |
      ---
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: sonarr-config
        namespace: {{ sonarr_namespace }}
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: {{ storage_class }}
        resources:
          requests:
            storage: 1Gi
      ---
      apiVersion: v1
      kind: PersistentVolume
      metadata:
        name: sonarr-media-pv
      spec:
        capacity:
          storage: 500Gi
        accessModes:
          - ReadWriteMany
        persistentVolumeReclaimPolicy: Retain
        csi:
          driver: smb.csi.k8s.io
          readOnly: false
          volumeHandle: sonarr-media-smb
          volumeAttributes:
            source: //100.90.217.18/Videos/Shows
      ---
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: sonarr-media
        namespace: {{ sonarr_namespace }}
      spec:
        accessModes:
          - ReadWriteMany
        storageClassName: ""
        resources:
          requests:
            storage: 500Gi
        volumeName: sonarr-media-pv
  become: no

- name: Apply Sonarr PVCs
  ansible.builtin.command: kubectl apply -f /tmp/sonarr-pvcs.yaml
  changed_when: true
  become: no

- name: Update Helm repositories
  ansible.builtin.command: helm repo update
  changed_when: false
  become: no

- name: Create Sonarr Helm values file
  ansible.builtin.copy:
    dest: /tmp/sonarr-values.yaml
    content: |
      env:
        TZ: UTC
        # qBittorrent connection details (configure in Sonarr UI under Settings > Download Clients)
        # Host: qbittorrent.{{ qbittorrent_namespace }}.svc.cluster.local
        # Port: 8080
        # Username: admin
        # Category: tv-sonarr
      
      service:
        main:
          type: ClusterIP
          annotations:
            tailscale.com/expose: "true"
            tailscale.com/hostname: "{{ tailscale_sonarr_hostname | default('sonarr') }}"
          ports:
            http:
              port: 8989
      
      persistence:
        config:
          enabled: true
          existingClaim: sonarr-config
        media:
          enabled: true
          existingClaim: sonarr-media
          mountPath: /media
        downloads:
          enabled: true
          mountPath: /downloads
          storageClass: {{ storage_class }}
          accessMode: ReadWriteMany
          size: 10Gi
      
      resources:
        limits:
          cpu: 1000m
          memory: 2Gi
        requests:
          cpu: 100m
          memory: 512Mi

- name: Deploy Sonarr using Helm
  ansible.builtin.command: >
    helm upgrade --install sonarr pree/sonarr
    --namespace {{ sonarr_namespace }}
    --values /tmp/sonarr-values.yaml
    {{ '--version ' + sonarr_chart_version if sonarr_chart_version else '' }}
    --wait
  changed_when: true
  become: no
